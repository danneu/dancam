# Inventory for the dancam camera unit. This file carries only the shared host
# constant; the connection user and SSH key come from .env via the
# raspi-provision* Just recipes. Provisioning always runs over home Wi-Fi -- task
# 1 (apt) needs internet and the Pi's AP mode (ipv4.method shared) has no
# upstream, so there is no 10.42.0.1 provisioning path. Override the address with
# `-e ansible_host=...` (the Just recipes' host= param) when mDNS is flaky and you
# need to reach the Pi at a raw LAN IP.
[dancam]
dancam ansible_host=dancam.local
