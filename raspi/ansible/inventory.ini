# Inventory for the dancam camera unit. Mirrors deploy.sh defaults
# (dan@dancam.local, key id_ed25519_danneu). Provisioning always runs over home
# Wi-Fi -- task 1 (apt) needs internet and the Pi's AP mode (ipv4.method shared)
# has no upstream, so there is no 10.42.0.1 provisioning path. Override the address
# with `-e ansible_host=...` (the Just recipes' host= param) when mDNS is flaky and
# you need to reach the Pi at a raw LAN IP.
[dancam]
dancam ansible_host=dancam.local ansible_user=dan ansible_ssh_private_key_file=~/.ssh/id_ed25519_danneu
