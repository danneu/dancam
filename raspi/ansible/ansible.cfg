# Ansible configuration for provisioning the dancam Pi system layer. Picked up
# automatically when ansible-playbook / ansible-lint run from this directory (the
# Justfile recipes cd here first).
[defaults]
inventory = inventory.ini
# The Pi's system Python is the right interpreter; auto-discover it without the
# noisy "discovered interpreter" warning on every run.
interpreter_python = auto_silent

[ssh_connection]
# A freshly-flashed Pi has no known_hosts entry yet; accept-new trusts it on first
# sight (then pins it) so first provision does not hang on an interactive prompt.
ssh_args = -o StrictHostKeyChecking=accept-new
# One SSH round-trip per task instead of several -- meaningfully faster over the
# Pi's 2.4 GHz link. Works because Raspberry Pi OS sudo does not require a tty.
pipelining = true
