---
- name: Converge the writable dancam development Pi
  hosts: dancam
  become: true

  pre_tasks:
    - name: Converge development prerequisites and mounts
      ansible.builtin.include_role:
        name: dev_runtime

  roles:
    - role: system_common

  post_tasks:
    - name: Apply live development service state
      ansible.builtin.include_role:
        name: dev_runtime
        tasks_from: runtime
