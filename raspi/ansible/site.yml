---
# The dancam Pi system layer, declaratively. Ansible owns onboard system state
# (apt, the config.txt camera overlay, Avahi scoping, locale, the dancam-ap profile,
# the dancam service user's video group); deploy.sh still owns the dancam binary +
# systemd unit, and the README owns the human-only/runtime-only steps. One home per
# fact: a command lives here, its hard-won "why" lives as the # comment on the
# action it justifies. See
# docs/design/pi/provisioning.md.
- name: Converge the dancam Pi system layer
  hosts: dancam
  become: true

  vars:
    car_image: false

  tasks:
    # Dev-shared storage adoption lives here: both the desk image and the later car
    # image use /persist and /data. Car-image-only hardening (read-only root,
    # read-only /boot/firmware, tmpfs/binds, storage health) is gated behind the
    # car_image flag so the desk image stays writable.

    - name: Check for the dancam data partition label
      # Stage 4 is a flag day: old expanded-root cards cannot be migrated in place
      # because ext4 cannot shrink. Fail before touching apt/config state so the
      # fix is the explicit one: reflash and run the partitioner.
      ansible.builtin.stat:
        path: /dev/disk/by-label/dancam-data
      register: dancam_data_partition_label

    - name: Require the dancam SD card layout before provisioning
      ansible.builtin.fail:
        msg: "Missing /dev/disk/by-label/dancam-data; reflash and run `just raspi-partition` before provisioning."
      when: not dancam_data_partition_label.stat.exists

    - name: Upgrade all apt packages to current
      # Fresh Lite image lags; full == faithful "apt full-upgrade". notify fires
      # only when a package actually changed, so this reboots after ANY upgrade --
      # intentional and safe, and simpler than probing /run/reboot-required for
      # kernel-only (the README's old rule). See docs/design/pi/provisioning.md.
      ansible.builtin.apt:
        update_cache: true
        upgrade: full
      notify: Reboot host

    - name: Install the camera process runtime dependencies
      # LOAD-BEARING runtime deps of jet's camera owner: raspi/camera/camera.py
      # imports picamera2 and shells out to ffmpeg (FfmpegOutput) to mux the H.264
      # MPEG-TS recording segments, while v4l2-ctl from v4l-utils backs the
      # development-time `just raspi-hdr` sensor toggle. The deployed
      # DANCAM_BACKEND=camera service spawns the owner. Without these the Pi converges
      # clean yet the camera dies at
      # runtime (ImportError: picamera2 / ffmpeg-not-found) -- exactly the silent,
      # image-dependent drift this migration exists to kill. libcamera, numpy,
      # simplejpeg arrive transitively. install_recommends: false == the README's
      # --no-install-recommends, keeping the desktop GUI stack off Lite. No reboot
      # notify (no kernel/boot change). See
      # docs/design/pi/recording.md#camera-ownership-and-streams.
      ansible.builtin.apt:
        name: [python3-picamera2, ffmpeg, v4l-utils]
        state: present
        install_recommends: false

    - name: Disable camera auto-detect in config.txt
      # Arducam IMX708 is not an official module, so it is not auto-detected.
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        regexp: '^camera_auto_detect='
        line: 'camera_auto_detect=0'
      notify: Reboot host

    - name: Load the IMX708 device-tree overlay in config.txt
      # In-kernel overlay survives apt upgrade, unlike Arducam's prebuilt-driver
      # script. The anchored regexp won't touch a commented #dtoverlay; insertafter
      # keeps it in [all] scope even if a later section is appended.
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        regexp: '^dtoverlay=imx708$'
        line: 'dtoverlay=imx708'
        insertafter: '^\[all\]'
      notify: Reboot host

    - name: Scope mDNS (Avahi) to the wlan0 interface
      # Two DISTINCT failure modes motivate this task; do not conflate them.
      # (a) Directive ABSENT: Avahi falls back to all interfaces incl. loopback, can
      # self-conflict on a stale loopback publication, and renames the host to
      # dancam-2.local -- a boot race, so it flakes (some boots come up fine). This
      # is why the directive must exist AND land under [server]: ini_file guarantees
      # the section placement regardless of prior content, where lineinfile would
      # EOF-append it out of section if the key were ever absent, silently breaking
      # the scoping.
      # (b) Directive PRESENT but SPACED: no_extra_spaces is REQUIRED, not cosmetic.
      # ini_file defaults to "allow-interfaces = wlan0" (sep " = "), but Avahi's ini
      # parser strips only leading whitespace, so the space before = stays glued to
      # the key ("allow-interfaces "). That is then an UNKNOWN key, and Avahi treats
      # unknown keys as FATAL: load_config_file returns -1 and avahi-daemon refuses
      # to start (deterministic on every boot -- status "failed", journal "Invalid
      # configuration key"), NOT a silent ignore. no_extra_spaces emits
      # "allow-interfaces=wlan0", the exact form the README sed proved working.
      # backup preserves the README's .conf backup caution. mode '0644' is
      # avahi-daemon.conf's canonical perm and clears ansible-lint's default
      # risky-file-permissions rule, which ini_file would otherwise trip (it defaults
      # to create: true with no mode).
      community.general.ini_file:
        path: /etc/avahi/avahi-daemon.conf
        section: server
        option: allow-interfaces
        value: wlan0
        no_extra_spaces: true
        backup: true
        mode: '0644'
      notify: Restart avahi-daemon

    - name: Generate the en_US.UTF-8 locale
      # Silences the "cannot change locale (UTF-8)" SSH login warning on fresh Lite.
      community.general.locale_gen:
        name: en_US.UTF-8
        state: present

    - name: Provision the dancam-ap access point profile (no PSK)
      # AP profile spec per `docs/design/pi/networking.md`. The cipher pin --
      # proto rsn, pairwise ccmp, group ccmp -- removes TKIP/WPA1 from the beacon so
      # iOS stops flagging the AP "Weak Security"; without it a fresh provision
      # silently regresses that fix. The three cipher props MUST be YAML lists, not
      # scalars: community.general.nmcli marks proto/pairwise/group list-typed and
      # always parses the live value into a list, but in diff mode leaves the desired
      # value as written, then only does an order-insensitive list compare when BOTH
      # sides are lists. A scalar "proto: rsn" compares ["rsn"] != "rsn" and churns
      # every run -- breaking the changed=0 idempotency test (verification step 6);
      # the single-element list "[rsn]" compares equal and is idempotent. key-mgmt is
      # str-typed, so it stays scalar. The WPA PSK is omitted on purpose: it is set
      # once by hand on the Pi (README) so the secret never enters the repo or the
      # playbook, and leaving the secret field unmanaged is also what keeps this task
      # idempotent (round-tripping NM secret fields through the module is an
      # unreliable diff). autoconnect=false so bringing it up never strands the Mac.
      community.general.nmcli:
        conn_name: dancam-ap
        type: wifi
        ifname: wlan0
        ssid: dancam-dev
        autoconnect: false
        wifi:
          mode: ap
          band: bg
          channel: 1
        wifi_sec:
          key-mgmt: wpa-psk
          proto: [rsn]
          pairwise: [ccmp]
          group: [ccmp]
        method4: shared
        ip4: 10.42.0.1/24
        method6: ignore
        state: present

    - name: Ensure the dancam service user exists and is in the video group
      # jet's Picamera2 camera owner (DANCAM_BACKEND=camera, set on the deployed
      # unit) opens the camera under systemd as the fixed dancam service user, which
      # needs video-group membership to reach /dev/video11 (bcm2835-codec, used by
      # the hardware MJPEGEncoder) and /dev/dma_heap/* (libcamera buffers). A fresh
      # system user has no supplementary groups by default, so this is now
      # load-bearing system state rather than a re-guarantee of the Imager login
      # user's defaults. The playbook owns it rather than SupplementaryGroups on the
      # deploy.sh-owned unit.
      ansible.builtin.user:
        name: dancam
        system: true
        create_home: false
        groups: video
        append: true

    - name: Mount the persistent OS-state partition
      # /persist carries small OS state that must survive reboots and /data formats:
      # journald now, NetworkManager/timesync in the car-image pass. nofail keeps a
      # storage failure from bricking a headless unit in emergency mode.
      ansible.posix.mount:
        path: /persist
        src: LABEL=dancam-persist
        fstype: ext4
        opts: noatime,errors=remount-ro,nofail,x-systemd.device-timeout=10s
        dump: '0'
        passno: '2'
        state: mounted

    - name: Mount the recording data partition
      # /data is the only hot recording partition. Service-side mount witnesses
      # refuse recording/time mutations if this mount is missing; nofail keeps the
      # API and preview path reachable for diagnosis.
      ansible.posix.mount:
        path: /data
        src: LABEL=dancam-data
        fstype: ext4
        opts: noatime,errors=remount-ro,nofail,x-systemd.device-timeout=10s
        dump: '0'
        passno: '2'
        state: mounted

    - name: Create the persistent journal source directory
      # The bind mount exposes this directory at /var/log/journal. setgid preserves
      # the systemd-journal group on files journald creates after the restart.
      ansible.builtin.file:
        path: /persist/journal
        state: directory
        owner: root
        group: systemd-journal
        mode: '2755'
      notify:
        - Restart systemd-journald
        - Flush journald
        - Sync journald

    - name: Bind the persistent journal onto /var/log/journal
      # systemd-fstab-generator orders this after persist.mount, and upstream
      # systemd-journal-flush.service has RequiresMountsFor=/var/log/journal. The
      # bind keeps journal state on /persist without teaching journald a custom path.
      ansible.posix.mount:
        path: /var/log/journal
        src: /persist/journal
        fstype: none
        opts: bind,nofail
        dump: '0'
        passno: '0'
        state: mounted
      notify:
        - Restart systemd-journald
        - Flush journald
        - Sync journald

    - name: Create the recording directory on the data partition
      # Directory ownership is playbook-owned because partitioning knows only
      # geometry/filesystems, not the service user or recording layout.
      ansible.builtin.file:
        path: /data/rec
        state: directory
        owner: dancam
        group: dancam
        mode: '0755'

    # Persistent, size-capped journald so the abrupt reboots this unit takes (power
    # loss, watchdog resets, freezes) leave a post-mortem trail: previous-boot logs
    # survive in /persist/journal via the /var/log/journal bind, readable via
    # `journalctl -b -1`. Before this the dir existed but stayed volatile (Storage
    # defaulted to auto with logs only in /run), so the 2026-06-30 freeze and the ADR
    # 06 AP failure were unprovable. One
    # ini_file task per option, all writing the [Journal] drop-in; each notifies the
    # restart+flush+sync handlers so this boot's logs are captured durably on converge,
    # not left to shutdown-time flush timing (the bind now exists, so an explicit
    # restart+flush is what actually persists this boot). ini_file self-creates the
    # parent dir in normal mode and, under --check, reports would-change without
    # creating it or erroring on a
    # fresh Pi, so no separate `file: state=directory` task is needed (ansible.builtin.
    # copy to a file dest would fail_json on the missing parent under --check, aborting
    # the dry run). no_extra_spaces writes canonical Key=Value; mode 0644 is the
    # drop-in perm and clears ansible-lint risky-file-permissions. The 60- filename
    # prefix sorts our values above the vendor 10-/20-/50- range so a later-sorting
    # drop-in cannot silently override them (last assignment wins across merged
    # drop-ins). See `docs/design/pi/os-image.md#Freeze recovery and persistent logs`.
    - name: Set journald Storage to persistent
      community.general.ini_file:
        path: /etc/systemd/journald.conf.d/60-dancam-persistent.conf
        section: Journal
        option: Storage
        value: persistent
        no_extra_spaces: true
        mode: '0644'
      notify:
        - Restart systemd-journald
        - Flush journald
        - Sync journald

    - name: Cap the persistent journal size
      # SystemMaxUse=200M -- logs never crowd out recordings on the SD card.
      community.general.ini_file:
        path: /etc/systemd/journald.conf.d/60-dancam-persistent.conf
        section: Journal
        option: SystemMaxUse
        value: 200M
        no_extra_spaces: true
        mode: '0644'
      notify:
        - Restart systemd-journald
        - Flush journald
        - Sync journald

    - name: Shorten the journald fsync interval
      # SyncIntervalSec=60s -- journald flushes immediately only for CRIT+, and a
      # freeze gets no final flush, so a shorter cadence than the 5min default bounds
      # the lost log tail to ~60s: the deliberate wear-vs-diagnosability balance.
      community.general.ini_file:
        path: /etc/systemd/journald.conf.d/60-dancam-persistent.conf
        section: Journal
        option: SyncIntervalSec
        value: 60s
        no_extra_spaces: true
        mode: '0644'
      notify:
        - Restart systemd-journald
        - Flush journald
        - Sync journald

    # Arm the on-board BCM2835 hardware watchdog (/dev/watchdog0, bcm2835_wdt loaded
    # by default -- no config.txt change) via PID 1. systemd pings it every
    # RuntimeWatchdogSec/2 (30s); if PID 1 stops pinging -- a userspace hang, or a
    # kernel hard-freeze that also stalls the kernel ping worker (power present but
    # wedged, distinct from abrupt power loss) -- the board resets and the dancam
    # service comes back on boot (host recovery; the recorder boots Idle, so recording
    # resumes when the app re-issues /v1/recording/start -- auto-record-on-boot does
    # not yet exist). Timeout model: the BCM2835 heartbeat maxes at ~16s but the driver
    # exposes it as max_hw_heartbeat_ms (not a hard max_timeout), so the Linux watchdog
    # core accepts 60s as a logical timeout and re-pings the hardware while PID 1 lives
    # -- 60s is NOT capped/rejected to ~16s. A kernel hard-freeze stalls that worker
    # too, so the hardware then bites at ~16s regardless; 60s therefore governs only
    # the PID-1-stall case, chosen over an aggressive sub-16s deadline to avoid false
    # resets when PID 1 is merely slow under transient IO/thermal load (a false reset
    # interrupts recording). RebootWatchdogSec is deliberately left at its 10min
    # default: it governs only the shutdown/reboot phase (already armed by default),
    # and tightening it risks a hardware reset mid-unmount on the writable dev root
    # during a legitimately slow shutdown -- the recording design's corruption class
    # -- for no gain
    # on an unattended unit. Do NOT re-add it. Reuse the Reboot host handler:
    # RuntimeWatchdogSec is manager config a live PID 1 won't apply on daemon-reload
    # (needs daemon-reexec or a boot), so arming it authoritatively means rebooting on
    # change. See `docs/design/pi/os-image.md#Freeze recovery and persistent logs`.
    - name: Arm the on-board hardware watchdog via systemd
      community.general.ini_file:
        path: /etc/systemd/system.conf.d/60-dancam-watchdog.conf
        section: Manager
        option: RuntimeWatchdogSec
        value: 60s
        no_extra_spaces: true
        mode: '0644'
      notify: Reboot host

    - name: Clamp kernel dirty writeback for recording segments
      # The Pi has 512 MB RAM; ratio defaults can let too much segment data sit dirty,
      # widening the power-cut loss window and making segment-close fsync spikes
      # larger. These 16/64 MiB byte clamps are tunable after bench evidence.
      ansible.builtin.copy:
        dest: /etc/sysctl.d/60-dancam-writeback.conf
        mode: '0644'
        content: |
          # Bound dirty segment data on a 512 MB Pi.
          # Tunable after bench data: lower reduces power-cut exposure; higher reduces IO churn.
          vm.dirty_background_bytes=16777216
          vm.dirty_bytes=67108864
      notify: Reload sysctl settings

    - name: Enable weekly filesystem trimming
      # fstrim.timer reclaims deleted ring-buffer space for the SD controller without
      # paying discard latency on every unlink/write.
      ansible.builtin.systemd_service:
        name: fstrim.timer
        enabled: true
        state: started

    - name: Create persistent NetworkManager state directories
      # The car image freezes root after first boot, but the AP PSK is hand-set and
      # must survive reboots without writing /etc. Seed first, then bind from
      # /persist; machine-id and SSH host keys are already materialized by first boot
      # and simply freeze under the read-only root, so they need no mutable island.
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: /persist/nm, mode: '0755' }
        - { path: /persist/nm/system-connections, mode: '0700' }
        - { path: /persist/nm/var-lib, mode: '0755' }
      when: car_image

    - name: Seed NetworkManager connection profiles into persist
      # One-time copy preserves the hand-entered dancam-ap PSK before the bind mount
      # hides /etc/NetworkManager/system-connections under the read-only root.
      ansible.builtin.command:
        cmd: cp -a /etc/NetworkManager/system-connections/. /persist/nm/system-connections/
        creates: /persist/nm/.system-connections-seeded
      when: car_image

    - name: Mark NetworkManager connection profiles seeded
      # The sentinel lives outside the bind source so NetworkManager never sees a
      # non-profile marker under system-connections.
      ansible.builtin.copy:
        dest: /persist/nm/.system-connections-seeded
        content: ""
        force: false
        owner: root
        group: root
        mode: '0644'
      when: car_image

    - name: Seed NetworkManager runtime state into persist
      # NetworkManager writes leases, timestamps, and generated state under
      # /var/lib/NetworkManager; keeping that state in /persist avoids dirtying root.
      ansible.builtin.command:
        cmd: cp -a /var/lib/NetworkManager/. /persist/nm/var-lib/
        creates: /persist/nm/.var-lib-seeded
      when: car_image

    - name: Mark NetworkManager runtime state seeded
      # Prevents re-copying mutable NM state over the persisted state on later
      # pre-read-only maintenance runs.
      ansible.builtin.copy:
        dest: /persist/nm/.var-lib-seeded
        content: ""
        force: false
        owner: root
        group: root
        mode: '0644'
      when: car_image

    - name: Create persistent systemd-timesync state directories
      # timesyncd's clock state is the only clock source before the phone syncs time;
      # bind it to /persist so a read-only root does not lose the last-known time.
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: systemd-timesync
        group: systemd-timesync
        mode: '0755'
      loop:
        - /var/lib/systemd/timesync
        - /persist/timesync
      when: car_image

    - name: Seed systemd-timesync state into persist
      # Preserve any first-boot clock file before the read-only car image binds the
      # live timesync path to /persist.
      ansible.builtin.command:
        cmd: cp -a /var/lib/systemd/timesync/. /persist/timesync/
        creates: /persist/.timesync-seeded
      when: car_image

    - name: Mark systemd-timesync state seeded
      # Prevents a later maintenance provision from overwriting newer persisted
      # timesync state with an older pre-bind copy.
      ansible.builtin.copy:
        dest: /persist/.timesync-seeded
        content: ""
        force: false
        owner: root
        group: root
        mode: '0644'
      when: car_image

    - name: Bind persistent NetworkManager connection profiles
      # The AP PSK lives in the profile files; binding this path is what lets the car
      # image keep the secret across a read-only-root reboot without committing it.
      # nofail keeps a bad /persist from becoming an emergency-mode brick; the
      # storage-health unit reports the unhealthy state after boot.
      ansible.posix.mount:
        path: /etc/NetworkManager/system-connections
        src: /persist/nm/system-connections
        fstype: none
        opts: bind,nofail
        dump: '0'
        passno: '0'
        state: mounted
      when: car_image

    - name: Bind persistent NetworkManager runtime state
      # NetworkManager's mutable runtime state is small OS state, not footage, so it
      # belongs in /persist and stays out of the /data format boundary. nofail keeps
      # /persist damage diagnosable instead of boot-blocking.
      ansible.posix.mount:
        path: /var/lib/NetworkManager
        src: /persist/nm/var-lib
        fstype: none
        opts: bind,nofail
        dump: '0'
        passno: '0'
        state: mounted
      when: car_image

    - name: Bind persistent systemd-timesync state
      # Preserves last-known clock state across car-image boots while keeping /var
      # itself read-only except for explicit tmpfs or bind-mounted islands. nofail
      # lets the boot-health unit surface /persist damage.
      ansible.posix.mount:
        path: /var/lib/systemd/timesync
        src: /persist/timesync
        fstype: none
        opts: bind,nofail
        dump: '0'
        passno: '0'
        state: mounted
      when: car_image

    - name: Configure tmpfs for /tmp on the car image
      # /tmp is scratch space; tmpfs avoids dirtying the read-only root and caps RAM
      # exposure on a 512 MB board. Applied on the reboot that flips root read-only.
      ansible.posix.mount:
        path: /tmp
        src: tmpfs
        fstype: tmpfs
        opts: rw,nosuid,nodev,noatime,mode=1777,size=64M
        dump: '0'
        passno: '0'
        state: present
      notify: Reboot host
      when: car_image

    - name: Configure tmpfs for /var/log on the car image
      # Volatile logs stay bounded while /var/log/journal is separately bind-mounted
      # from /persist/journal; systemd orders the nested mount by path depth at boot.
      ansible.posix.mount:
        path: /var/log
        src: tmpfs
        fstype: tmpfs
        opts: rw,nosuid,nodev,noatime,mode=0755,size=32M
        dump: '0'
        passno: '0'
        state: present
      notify: Reboot host
      when: car_image

    - name: Configure the car image root filesystem read-only
      # Plain read-only ext4 fails loud with EROFS and avoids overlayfs' silent
      # fallback/recursion hazards. Do not remount live while Ansible is still
      # writing config; the notified reboot applies this fstab posture.
      ansible.posix.mount:
        path: /
        src: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='device') | first) | default('/dev/mmcblk0p2', true) }}"
        fstype: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='fstype') | first) | default('ext4', true) }}"
        opts: ro,noatime,errors=remount-ro
        dump: '0'
        passno: '1'
        state: present
      notify: Reboot host
      when: car_image

    - name: Configure the car image boot filesystem read-only
      # Firmware/kernel writes are bench-only maintenance operations; the deployed
      # image should not leave FAT metadata writable during normal car power cuts.
      ansible.posix.mount:
        path: /boot/firmware
        src: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/boot/firmware') | map(attribute='device') | first) | default('/dev/mmcblk0p1', true) }}"
        fstype: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/boot/firmware') | map(attribute='fstype') | first) | default('vfat', true) }}"
        opts: ro,noatime
        dump: '0'
        passno: '0'
        state: present
      notify: Reboot host
      when: car_image

    - name: Mask unattended package-maintenance timers on the car image
      # apt/dpkg/man-db write package metadata under the read-only root. Car-image
      # maintenance is a bench action after an intentional remount, not a timer.
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: false
        masked: true
        state: stopped
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
        - man-db.timer
        - dpkg-db-backup.timer
      when: car_image

    - name: Gather service facts for legacy swap detection
      # Trixie uses rpi-swap/zram, but masking the legacy swapfile service keeps an
      # older image from reintroducing file-backed swap on the read-only root.
      ansible.builtin.service_facts:
      when: car_image

    - name: Mask legacy dphys-swapfile service when present
      # Old images may still carry this service; masking it avoids a future package
      # hook or reboot recreating /var/swap.
      ansible.builtin.systemd_service:
        name: dphys-swapfile.service
        enabled: false
        masked: true
        state: stopped
      when:
        - car_image
        - "'dphys-swapfile.service' in ansible_facts.services"

    - name: Ensure the stock zram swap service is active
      # Raspberry Pi OS Trixie uses rpi-swap for RAM-backed zram swap. Keep that
      # service explicit so removing SD-backed swap does not leave the 512 MB unit
      # without the stock memory-pressure cushion.
      ansible.builtin.systemd_service:
        name: rpi-swap.service
        enabled: true
        state: started
      when: car_image

    - name: Detect active file-backed swap
      # Pure zram swap is acceptable on the 512 MB Pi; SD-backed swap is not, because
      # it adds uncontrolled writes to the same card we are protecting from power cuts.
      ansible.builtin.command: awk 'NR > 1 && ($1 == "/var/swap" || $1 == "/swapfile") { print $1 }' /proc/swaps
      register: dancam_active_file_swap
      changed_when: false
      when: car_image

    - name: Turn off active file-backed swap
      # Remove the live SD-backed swap device before deleting its file, otherwise the
      # inode can stay swapped-on after the directory entry is gone.
      ansible.builtin.command: "swapoff {{ item }}"
      loop: "{{ dancam_active_file_swap.stdout_lines | default([]) }}"
      changed_when: true
      when: car_image

    - name: Remove file-backed swap images
      # Leaves the car image with only rpi-swap's RAM-backed zram swap.
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/swap
        - /swapfile
      when: car_image

    - name: Assert zram has no writeback device
      # If a future image wires zram writeback to disk, fail loud instead of silently
      # preserving a hidden SD write path under the read-only-root car profile.
      ansible.builtin.shell: |
        set -eu
        for backing in /sys/block/zram*/backing_dev; do
          [ -e "$backing" ] || continue
          value="$(cat "$backing")"
          [ "$value" = none ] || printf '%s=%s\n' "$backing" "$value"
        done
      args:
        executable: /bin/sh
      register: dancam_zram_writeback_devices
      changed_when: false
      failed_when: dancam_zram_writeback_devices.stdout | length > 0
      when: car_image

    - name: Create dancam helper directory
      # Ansible owns this boot-time helper; deploy.sh may later reuse the same
      # directory for the camera process on bench deploys.
      ansible.builtin.file:
        path: /usr/local/lib/dancam
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: car_image

    - name: Install the boot storage-health witness script
      # Boot must stay diagnosable when /data is bad: nofail avoids emergency mode,
      # this unit turns storage damage red in systemctl --failed, and the service's
      # per-mutation mount witness refuses recording/time writes.
      ansible.builtin.copy:
        dest: /usr/local/lib/dancam/storage-health.sh
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/sh
          set -eu

          for mount_path in /persist /data; do
            info="$(findmnt -nro FSTYPE,OPTIONS --mountpoint "$mount_path")" || {
              echo "$mount_path is not mounted" >&2
              exit 1
            }

            set -- $info
            fstype="$1"
            opts="$2"

            if [ "$fstype" != ext4 ]; then
              echo "$mount_path is $fstype, expected ext4" >&2
              exit 1
            fi

            case ",$opts," in
              *,rw,*) ;;
              *)
                echo "$mount_path is not mounted rw" >&2
                exit 1
                ;;
            esac

            probe="$mount_path/.dancam-storage-health"
            printf checked > "$probe"
            sync -f "$probe" 2>/dev/null || sync
            rm -f "$probe"
          done
      when: car_image

    - name: Install the boot storage-health witness unit
      # Enabled independently from dancam.service so it is red in systemctl --failed
      # even when the API stays up for diagnosis.
      ansible.builtin.copy:
        dest: /etc/systemd/system/dancam-storage-health.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=DanCam storage mount health check
          Documentation=man:findmnt(8)
          DefaultDependencies=no
          After=local-fs.target
          Before=dancam.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/usr/local/lib/dancam/storage-health.sh

          [Install]
          WantedBy=multi-user.target
      when: car_image

    - name: Enable the boot storage-health witness unit
      # It starts at every boot via multi-user.target; ordering before dancam.service
      # makes the boot-time storage verdict visible before the API starts.
      ansible.builtin.systemd_service:
        name: dancam-storage-health.service
        enabled: true
        daemon_reload: true
      when: car_image

  handlers:
    - name: Restart avahi-daemon
      # Re-read avahi-daemon.conf so the wlan0 scoping takes effect now, not just on
      # next boot.
      ansible.builtin.service:
        name: avahi-daemon
        state: restarted

    # The three journald handlers are defined in run order (restart, then flush, then
    # sync) and before Reboot host, so on a converge that touches both drop-ins this
    # boot's logs are persisted and synced first, then the reboot arms the watchdog.
    - name: Restart systemd-journald
      # Re-read the drop-in so Storage=persistent takes effect for the current boot and
      # /var/log/journal is created/used now, not just on next boot.
      ansible.builtin.service:
        name: systemd-journald
        state: restarted

    - name: Flush journald
      # Migrate this boot's runtime logs from /run into the now-persistent store, so
      # the converge boot is captured durably before any Reboot host fires. Flushing is
      # not config drift, so changed_when false keeps the changed=0 idempotency bar.
      ansible.builtin.command: journalctl --flush
      changed_when: false

    - name: Sync journald
      # fsync the persistent store so the flushed logs survive an abrupt reboot. Like
      # Flush journald this is an action, not drift, so it stays changed_when false.
      ansible.builtin.command: journalctl --sync
      changed_when: false

    - name: Reload sysctl settings
      # Apply the writeback clamp immediately; the drop-in also persists it for boot.
      # This is an action, not drift, so the handler does not mark the run changed.
      ansible.builtin.command: sysctl -p /etc/sysctl.d/60-dancam-writeback.conf
      changed_when: false

    # Defined last so it runs after the other handlers. A handler runs once per play no
    # matter how many tasks notify it; on a clean re-run nothing is notified, so no
    # reboot. The reboot module waits for the connection to come back on its own.
    - name: Reboot host
      ansible.builtin.reboot:
